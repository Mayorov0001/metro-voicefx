name: Build

on:
  push:
    branches: [ master, main ]
    paths-ignore: [ 'bench/**', '.github/workflows/bench.yml' ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        repository: danielga/garrysmod_common
        ref: x86-64-support-sourcesdk
        path: 'garrysmod_common'
    - name: Install Premake
      run: |
        wget https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz -O premake.tar.gz
        tar -xvf premake.tar.gz
        chmod +x premake5
        sudo cp premake5 /usr/bin
        sudo apt-get update
        sudo apt-get install g++-multilib
        gcc --version
    - name: Generate Project
      run: |
        premake5 --gmcommon=garrysmod_common gmake
    # premake5 beta8 needs a modern glibc so it runs on the 24.04 host, but
    # compiling here would bake GLIBC_2.38 symbol refs into the module and it
    # would fail to load on older server containers. So we only GENERATE the
    # Makefiles on the host; the actual compile runs inside ubuntu:20.04
    # (glibc 2.31) so the .dll only needs old, widely-available glibc symbols.
    # Combined with -static-libstdc++/-static-libgcc (premake5.lua) the module
    # is self-contained and loads on virtually any GMod host.
    - name: Make (in ubuntu:20.04 for old-glibc portability)
      run: |
        docker run --rm -v "$PWD":/src -w /src ubuntu:20.04 bash -c '
          set -e
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential g++-multilib
          cd projects/linux/gmake
          make
          make config=releasewithsymbols_x86_64
        '
    - uses: actions/upload-artifact@v4
      with:
        name: gmsv_metro_voicefx_linux.dll
        path: projects/linux/gmake/x86/ReleaseWithSymbols/gmsv_metro_voicefx_linux.dll
    - uses: actions/upload-artifact@v4
      with:
        name: gmsv_metro_voicefx_linux64.dll
        path: projects/linux/gmake/x86_64/ReleaseWithSymbols/gmsv_metro_voicefx_linux64.dll
  build-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        repository: danielga/garrysmod_common
        path: 'garrysmod_common'
        ref: x86-64-support-sourcesdk
    - name: Install Premake
      run: |
         curl -L https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-windows.zip -o premake.zip
         tar -xf premake.zip
    - name: Generate Project
      run: |
        ./premake5.exe --gmcommon=garrysmod_common vs2019
    - name: Build
      run: |
        cd projects/windows/vs2019
        & "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\msbuild.exe" /p:Configuration=ReleaseWithSymbols /p:Platform=Win32 metro_voicefx.sln
    - uses: actions/upload-artifact@v4
      with:
        name: gmsv_metro_voicefx_windows.dll
        path: projects/windows/vs2019/x86/ReleaseWithSymbols/gmsv_metro_voicefx_win32.dll
    - name: Build 64
      run: |
        cd projects/windows/vs2019
        & "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\msbuild.exe" /p:Configuration=ReleaseWithSymbols /p:Platform=x64 metro_voicefx.sln
    - uses: actions/upload-artifact@v4
      with:
        name: gmsv_metro_voicefx_win64.dll
        path: projects/windows/vs2019/x86_64/ReleaseWithSymbols/gmsv_metro_voicefx_win64.dll

